name: saobracajke
description: "Pregledaj otvorene podatke o saobraćajnim nezgodama u Srbiji — mapa nezgoda, statistika po opštinama, trendovi kroz vreme. Podaci sa data.gov.rs."
publish_to: "none"
version: 1.2.0+5

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.2.0
  path: ^1.9.1
  path_provider: ^2.1.5
  sqflite: ^2.4.2
  archive: ^4.0.7
  intl: ^0.20.2
  fl_chart: ^1.1.1
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  flutter_map_marker_cluster: ^8.2.2
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.5
  package_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.4.0+2
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/db/serbian_traffic.db.zip
  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans.ttf
